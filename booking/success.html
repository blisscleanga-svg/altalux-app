<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed | AltaLux Mobile Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#104872; --orange:#FF8C00; --gold:#FFAA00;
    --dark:#0a1628; --dark-2:#0f1f38; --white:#FFFFFF;
    --ink-muted:rgba(255,255,255,.62); --ink-faint:rgba(255,255,255,.38);
    --line:rgba(255,170,0,.16); --radius-lg:20px; --radius-md:14px;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at top, var(--dark-2), var(--dark) 70%);
    font-family:'Inter',sans-serif; color:var(--white); padding:24px;
  }
  .card{
    width:100%; max-width:480px; text-align:center;
    background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
    border:1px solid var(--line); border-radius:var(--radius-lg);
    padding:44px 32px; box-shadow:0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .brand{ font-family:'Rajdhani',sans-serif; font-size:24px; font-weight:700; letter-spacing:1px; margin:0 0 28px; }
  .brand .lux{ color:var(--gold); }
  .check{
    width:76px; height:76px; border-radius:50%; margin:0 auto 22px;
    background:linear-gradient(135deg,var(--gold),var(--orange)); color:var(--dark);
    display:flex; align-items:center; justify-content:center; font-size:38px; font-weight:700;
    box-shadow:0 10px 28px rgba(255,140,0,.35); animation:popIn .4s ease;
  }
  @keyframes popIn{ 0%{ transform:scale(0); opacity:0; } 70%{ transform:scale(1.1); } 100%{ transform:scale(1); opacity:1; } }
  h1{ font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; margin:0 0 10px; }
  p{ color:var(--ink-muted); font-size:15px; line-height:1.6; margin:0 0 6px; }
  .contact{ margin-top:26px; font-size:13.5px; color:var(--ink-faint); }
  .contact strong{ color:var(--white); }
  .btn{
    display:inline-block; margin-top:26px; padding:14px 28px; border-radius:999px;
    background:linear-gradient(135deg,var(--gold),var(--orange)); color:var(--dark);
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; text-decoration:none;
  }
</style>
</head>
<body>
  <div class="card">
    <p class="brand">ALTA<span class="lux">LUX</span></p>
    <div class="check">✓</div>
    <h1>Booking Confirmed!</h1>
    <p>Thank you for choosing AltaLux Mobile Detail. We've received your request and will be in touch shortly to confirm your appointment.</p>
    <p class="contact">Questions? Call us at <strong>(888) 853-0590</strong></p>
    <a class="btn" href="/booking">Book Another Service</a>
  </div>
</body>
</html>
